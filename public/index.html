<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intelligent Media Pipeline</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
        }

        .upload-area {
            border: 2px dashed var(--glass-border);
            border-radius: 16px;
            padding: 3rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(15, 23, 42, 0.4);
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.05);
        }

        .upload-area input[type="file"] {
            display: none;
        }

        .upload-area svg {
            width: 48px;
            height: 48px;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
            margin-top: 1.5rem;
            width: 100%;
        }

        .btn:hover {
            background: var(--primary-hover);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
            transform: none;
        }

        #status-container {
            margin-top: 2rem;
            display: none;
            text-align: center;
        }

        .loader {
            border: 4px solid var(--glass-border);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #results-container {
            margin-top: 2.5rem;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .summary-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .summary-stat {
            text-align: center;
        }

        .summary-stat span {
            display: block;
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
        }

        .summary-stat strong {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .check-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1rem;
        }

        .check-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-left: 4px solid var(--text-muted);
            border-radius: 8px;
            padding: 1.25rem;
            transition: transform 0.2s;
        }

        .check-card:hover {
            transform: translateY(-2px);
        }

        .check-card.passed {
            border-left-color: var(--success);
        }

        .check-card.failed {
            border-left-color: var(--danger);
        }

        .check-name {
            font-weight: 600;
            font-size: 1.05rem;
            margin-bottom: 0.5rem;
            text-transform: capitalize;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .check-score {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            vertical-align: middle;
        }

        .badge-aws {
            background: rgba(255, 153, 0, 0.15);
            color: #ff9900;
            border: 1px solid rgba(255, 153, 0, 0.3);
        }

        .badge-s3 {
            background: rgba(255, 153, 0, 0.12);
            color: #ff9900;
            border: 1px solid rgba(255, 153, 0, 0.25);
        }

        .badge-local {
            background: rgba(148, 163, 184, 0.15);
            color: var(--text-muted);
            border: 1px solid rgba(148, 163, 184, 0.2);
        }

        .detail-row {
            display: flex;
            align-items: flex-start;
            gap: 0.4rem;
            font-size: 0.82rem;
            margin-bottom: 0.3rem;
        }

        .detail-key {
            color: var(--text-muted);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .detail-val {
            color: var(--text-main);
            word-break: break-word;
        }

        .detail-bool-true {
            color: var(--success);
            font-weight: 600;
        }

        .detail-bool-false {
            color: var(--danger);
            font-weight: 600;
        }

        .detail-bool-ok {
            color: var(--success);
            font-weight: 600;
        }

        .score-bar-wrap {
            background: rgba(255,255,255,0.07);
            border-radius: 4px;
            height: 4px;
            margin-bottom: 0.75rem;
            overflow: hidden;
        }

        .score-bar {
            height: 100%;
            border-radius: 4px;
            transition: width 0.6s ease;
        }

        .s3-preview {
            margin-top: 1.5rem;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
        }

        .s3-preview img {
            width: 100%;
            max-height: 280px;
            object-fit: cover;
            display: block;
        }

        .s3-label {
            background: rgba(255,153,0,0.1);
            border-bottom: 1px solid rgba(255,153,0,0.2);
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            color: #ff9900;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-weight: 600;
        }

        #file-name-display {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #34d399;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Media Processing AI</h1>
        <p class="subtitle">Upload a vehicle image for deep analysis & validation.</p>

        <div class="upload-area" id="drop-area" onclick="document.getElementById('file-input').click()">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
            <h3 style="margin:0; font-weight: 600;">Drag & Drop or Click to Upload</h3>
            <p style="margin: 0.5rem 0 0; color: var(--text-muted); font-size: 0.9rem;">JPEG, PNG, WEBP up to 10MB</p>
            <div id="file-name-display"></div>
            <input type="file" id="file-input" accept="image/jpeg, image/png, image/webp">
        </div>

        <button class="btn" id="upload-btn" disabled>Process Image</button>

        <div id="status-container">
            <div class="loader"></div>
            <h3 id="status-text">Processing in background...</h3>
            <p id="status-subtext" style="color: var(--text-muted); font-size: 0.9rem;"></p>
        </div>

        <div id="results-container">
            <h2 style="margin-top: 0; text-align: center;">Analysis Results</h2>
            <div class="summary-card" id="summary-card">
                <!-- Summary injected here -->
            </div>
            <div class="check-grid" id="check-grid">
                <!-- Checks injected here -->
            </div>
            <button class="btn" onclick="resetUI()" style="margin-top: 2rem; background: transparent; border: 1px solid var(--glass-border);">Analyze Another Image</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const fileInput = document.getElementById('file-input');
        const dropArea = document.getElementById('drop-area');
        const uploadBtn = document.getElementById('upload-btn');
        const fileNameDisplay = document.getElementById('file-name-display');
        
        const statusContainer = document.getElementById('status-container');
        const statusText = document.getElementById('status-text');
        const statusSubtext = document.getElementById('status-subtext');
        
        const resultsContainer = document.getElementById('results-container');
        const summaryCard = document.getElementById('summary-card');
        const checkGrid = document.getElementById('check-grid');

        let selectedFile = null;

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                selectedFile = e.target.files[0];
                updateFileDisplay();
            }
        });

        dropArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropArea.classList.add('dragover');
        });

        dropArea.addEventListener('dragleave', () => {
            dropArea.classList.remove('dragover');
        });

        dropArea.addEventListener('drop', (e) => {
            e.preventDefault();
            dropArea.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                selectedFile = e.dataTransfer.files[0];
                updateFileDisplay();
            }
        });

        function updateFileDisplay() {
            fileNameDisplay.textContent = `Selected: ${selectedFile.name}`;
            uploadBtn.disabled = false;
            resultsContainer.style.display = 'none';
            statusContainer.style.display = 'none';
        }

        function resetUI() {
            selectedFile = null;
            fileInput.value = '';
            fileNameDisplay.textContent = '';
            uploadBtn.disabled = true;
            resultsContainer.style.display = 'none';
            statusContainer.style.display = 'none';
        }

        uploadBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            const formData = new FormData();
            formData.append('image', selectedFile);

            uploadBtn.disabled = true;
            statusContainer.style.display = 'block';
            statusText.textContent = "Uploading image...";
            statusSubtext.textContent = "";
            resultsContainer.style.display = 'none';

            try {
                const res = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                const text = await res.text();
                let data;
                try { data = JSON.parse(text); } catch { throw new Error('Server error: ' + text.replace(/<[^>]+>/g, '').trim().substring(0, 120)); }

                if (!res.ok) throw new Error(data.error || 'Upload failed');

                const jobId = data.jobId;
                listenForStatus(jobId);

            } catch (err) {
                statusText.textContent = "Error";
                statusSubtext.textContent = err.message;
                statusSubtext.style.color = "var(--danger)";
                document.querySelector('.loader').style.display = 'none';
                uploadBtn.disabled = false;
            }
        });

        function listenForStatus(jobId) {
            statusText.textContent = "Processing image...";
            statusSubtext.textContent = `Job ID: ${jobId}`;
            statusSubtext.style.color = "var(--text-muted)";
            document.querySelector('.loader').style.display = 'block';

            socket.emit('subscribe', jobId);

            socket.on('job-completed', (data) => {
                if (data.jobId === jobId) {
                    fetchResults(jobId);
                }
            });

            socket.on('job-failed', (data) => {
                if (data.jobId === jobId) {
                    fetchFailure(jobId);
                }
            });
        }

        async function fetchFailure(jobId) {
            try {
                const res = await fetch(`/jobs/${jobId}/failure`);
                const data = await res.json();
                
                statusText.textContent = "Processing Failed";
                statusSubtext.textContent = data.failureReason || "Unknown error occurred.";
                statusSubtext.style.color = "var(--danger)";
                document.querySelector('.loader').style.display = 'none';
                uploadBtn.disabled = false;
            } catch (err) {
                console.error(err);
            }
        }

        async function fetchResults(jobId) {
            try {
                const res = await fetch(`/jobs/${jobId}/results`);
                const data = await res.json();
                
                statusContainer.style.display = 'none';
                renderResults(data);
            } catch (err) {
                console.error(err);
            }
        }

        const CHECK_LABELS = {
            blur_detection:       'Blur Detection',
            brightness_analysis:  'Brightness Analysis',
            duplicate_detection:  'Duplicate Detection',
            screenshot_detection: 'Screenshot Detection',
            ocr_plate_validation: 'Number Plate OCR',
            tampering_detection:  'Tampering Detection'
        };

        const DETAIL_LABELS = {
            laplacianVariance:    'Sharpness variance',
            threshold:            'Threshold',
            verdict:              'Verdict',
            meanBrightness:       'Mean brightness',
            isDuplicate:          'Is duplicate',
            minDistance:          'Hash distance',
            duplicateJobId:       'Duplicate job',
            heuristicsFired:      'Heuristics triggered',
            software:             'Software tag',
            dimensions:           'Dimensions',
            extractedText:        'Detected text',
            matchesIndianFormat:  'Plate format valid',
            engine:               'OCR engine',
            regex:                'Pattern',
            dateInconsistency:    'Date inconsistency',
            suspiciousSoftware:   'Suspicious software',
            softwareField:        'Software',
            reason:               'Note'
        };

        function formatDetailValue(key, val) {
            if (val === null || val === undefined) return null;
            if (key === 'engine') return null; // shown as badge instead
            if (typeof val === 'boolean') {
                const isGoodWhenTrue = ['matchesIndianFormat'].includes(key);
                const isGoodWhenFalse = ['isDuplicate', 'dateInconsistency', 'suspiciousSoftware'].includes(key);
                if (isGoodWhenTrue) return `<span class="${val ? 'detail-bool-true' : 'detail-bool-false'}">${val ? '✓ Yes' : '✗ No'}</span>`;
                if (isGoodWhenFalse) return `<span class="${val ? 'detail-bool-false' : 'detail-bool-ok'}">${val ? '✗ Yes' : '✓ No'}</span>`;
                return `<span class="detail-val">${val ? 'Yes' : 'No'}</span>`;
            }
            if (typeof val === 'number') {
                return `<span class="detail-val">${Number.isInteger(val) ? val : val.toFixed(2)}</span>`;
            }
            if (typeof val === 'string' && val.startsWith('aws-')) {
                return null; // engine shown as badge
            }
            return `<span class="detail-val">${val}</span>`;
        }

        function renderDetailRows(detail) {
            return Object.entries(detail)
                .filter(([k, v]) => v !== null && v !== undefined && k !== 'engine')
                .map(([k, v]) => {
                    const formatted = formatDetailValue(k, v);
                    if (formatted === null) return '';
                    const label = DETAIL_LABELS[k] || k.replace(/([A-Z])/g, ' $1').toLowerCase();
                    return `<div class="detail-row"><span class="detail-key">${label}:</span>${formatted}</div>`;
                }).join('');
        }

        function getEngineBadge(detail) {
            if (!detail || !detail.engine) return '';
            if (detail.engine === 'aws-rekognition') {
                return `<span class="badge badge-aws">
                    <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M13.5 2.5l7 4v11l-7 4-7-4v-11l7-4z"/></svg>
                    AWS Rekognition
                </span>`;
            }
            return `<span class="badge badge-local">Tesseract OCR</span>`;
        }

        function getScoreColor(score) {
            if (score >= 0.7) return 'var(--success)';
            if (score >= 0.4) return '#f59e0b';
            return 'var(--danger)';
        }

        function renderResults(data) {
            resultsContainer.style.display = 'block';

            const storageIsS3 = data.storageBackend === 's3';
            const storageBadge = storageIsS3
                ? `<span class="badge badge-s3">
                    <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M13.5 2.5l7 4v11l-7 4-7-4v-11l7-4z"/></svg>
                    AWS S3
                   </span>`
                : `<span class="badge badge-local">Local Storage</span>`;

            summaryCard.innerHTML = `
                <div class="summary-stat">
                    <span>Overall Score</span>
                    <strong style="color: ${getScoreColor(data.summary.overallScore)}">
                        ${(data.summary.overallScore * 100).toFixed(0)}%
                    </strong>
                </div>
                <div class="summary-stat">
                    <span>Checks Passed</span>
                    <strong>${data.summary.passed} / ${data.summary.totalChecks}</strong>
                </div>
                <div class="summary-stat">
                    <span>Storage</span>
                    <strong style="font-size: 0.95rem;">${storageBadge}</strong>
                </div>
                <div class="summary-stat">
                    <span>File</span>
                    <strong style="font-size: 0.9rem;">${data.filename.substring(0, 18)}${data.filename.length > 18 ? '…' : ''}</strong>
                </div>
            `;

            if (storageIsS3 && data.storageUrl) {
                const preview = document.createElement('div');
                preview.className = 's3-preview';
                preview.innerHTML = `
                    <div class="s3-label">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M13.5 2.5l7 4v11l-7 4-7-4v-11l7-4z"/></svg>
                        Stored in AWS S3 — ${data.storageUrl.split('/').pop()}
                    </div>
                    <img src="${data.storageUrl}" alt="Uploaded image" onerror="this.parentElement.style.display='none'">
                `;
                summaryCard.insertAdjacentElement('afterend', preview);
            }

            checkGrid.innerHTML = data.checks.map(check => {
                const label = CHECK_LABELS[check.name] || check.name.replace(/_/g, ' ');
                const engineBadge = getEngineBadge(check.detail);
                const scoreColor = getScoreColor(check.score);
                const score = (check.score * 100).toFixed(0);
                return `
                    <div class="check-card ${check.passed ? 'passed' : 'failed'}">
                        <div class="check-name">
                            ${label}
                            ${engineBadge}
                        </div>
                        <div class="check-score">Score: ${score}%</div>
                        <div class="score-bar-wrap">
                            <div class="score-bar" style="width:${score}%; background:${scoreColor};"></div>
                        </div>
                        <div>${renderDetailRows(check.detail)}</div>
                    </div>
                `;
            }).join('');
        }
    </script>
</body>
</html>
