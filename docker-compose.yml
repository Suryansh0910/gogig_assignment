
services:
  api:
    build: .
    command: npm run start
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/media_pipeline
      - REDIS_HOST=redis
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - mongo
      - redis

  worker:
    build: .
    command: npm run worker
    environment:
      - MONGODB_URI=mongodb://mongo:27017/media_pipeline
      - REDIS_HOST=redis
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - mongo
      - redis

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  mongo_data:
